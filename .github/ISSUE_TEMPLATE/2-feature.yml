name: 功能请求
description: 提出一个新功能或改进建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: checkboxes
    attributes:
      label: 是否已搜索已有 Issue
      description: 请先确认没有重复的功能请求
      options:
        - label: 我已搜索并确认此功能未被提出过
          required: true

  - type: dropdown
    id: module
    attributes:
      label: 相关模块
      description: 该功能涉及哪个子系统
      options:
        - scan（扫描）
        - pack（打包）
        - unpack（解包）
        - info（包信息）
        - cleanup（清理）
        - TUI（交互界面）
        - CLI（命令行）
        - 新模块
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 解决的问题
      description: 当前有什么不便或做不到的事？
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 你期望的交互方式或实现思路
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案
      description: 有哪些 workaround 或其他实现路径？

  - type: textarea
    id: design
    attributes:
      label: 接口设计（可选）
      description: 如果涉及 CLI 参数、TUI 界面、文件格式变化，请描述期望的形态
      placeholder: |
        ## CLI 示例
        chisel xxx --yyy ...

        ## 交互流程
        1. 用户选择 ...
        2. 确认后进入 ...

        ## 新增 / 变更的文件
        - metadata.json 中增加 ... 字段
